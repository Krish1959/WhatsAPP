<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Agentic AI - Terminal</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #e5ddd5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h2 { color: #075e54; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-send { background: #25D366; color: white; }
        .btn-clear { background: #f0f0f0; color: #555; }
        .received-section { border-top: 1px solid #eee; padding-top: 15px; }
        .received-box { width: 100%; height: 150px; background: #f9f9f9; color: #333; font-family: monospace; font-size: 13px; padding: 10px; border-radius: 5px; border: 1px solid #ddd; resize: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Avatar Agentic AI</h2>
        <form action="/manual-send" method="post">
            <label>To Phone</label>
            <input type="text" name="to_phone" placeholder="65xxxxxxxx" required>
            <label>Message Text</label>
            <textarea name="message" rows="3" required></textarea>
            <div class="btn-group">
                <button type="submit" class="btn-send">Send</button>
                <button type="reset" class="btn-clear" onclick="window.location.href='/'">Clear</button>
            </div>
        </form>
        <div class="received-section">
            <label>Messages Received:</label>
            <textarea class="received-box" readonly>{{ received_content }}</textarea>
        </div>
        <p style="text-align: center; font-size: 10px; color: #999; margin-top: 10px;">Connected to: {{ sender }}</p>
    </div>
</body>
</html>
