<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Agentic AI Console</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #e5ddd5; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { color: #075e54; text-align: center; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* Text Message Log - Renamed and Styled with scrollbars */
        .chat-box { 
            width: 100%; height: 300px; padding: 12px; margin-bottom: 15px;
            border: 2px solid #075e54; border-radius: 8px; background: #ffffff;
            font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; color: #333;
            overflow-y: auto; white-space: pre-wrap; word-wrap: break-word;
            display: block;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-send { background: #25D366; color: white; }
        .btn-clear { background: #f0f0f0; color: #555; }
        
        .debug-section { border-top: 1px solid #eee; padding-top: 10px; }
        .debug-box { width: 100%; height: 80px; background: #1e1e1e; color: #00ff00; font-family: monospace; font-size: 11px; padding: 8px; border-radius: 5px; border: none; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Avatar Agentic AI</h2>
        
        <form action="/manual-send" method="post">
            <label>To Phone</label>
            <input type="text" name="to_phone" placeholder="e.g. 6597890305" required>
            
            <label>Text Message</label>
            <textarea name="message" class="chat-box" placeholder="Incoming and outgoing messages will appear here...">{{ chat_content }}</textarea>

            <div class="btn-group">
                <button type="submit" class="btn-send">Send</button>
        </form>
                <form action="/clear" method="post" style="flex: 1;">
                    <button type="submit" class="btn-clear">Clear</button>
                </form>
            </div>

        <div class="debug-section">
            <label style="font-size: 12px;">Debug Messages:</label>
            <div class="debug-box">{{ debug_msg }}</div>
        </div>
        <p style="text-align: center; font-size: 10px; color: #999; margin-top: 10px;">Connected: {{ sender }}</p>
    </div>
</body>
</html>
